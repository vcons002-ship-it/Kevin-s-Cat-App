# Kevin's Cat App — example configuration.
#
# You normally DON'T edit this by hand: run the app and use the web GUI, which
# writes config.yaml for you. This file documents every setting and provides
# sensible defaults. `setup.sh` copies it to config.yaml on first run.

# --- Camera (legacy single active camera; used when active_cameras is empty) ---
camera_url: ""            # RTSP/HTTP stream, e.g. rtsp://192.168.1.50:554/stream1
camera_name: ""           # friendly name (filled in by auto-detect; display only)
camera_username: ""       # only if the stream needs a login
camera_password: ""

# --- Multi-camera: watch several at once, each with its own role & settings ---
# Manage these from the GUI's Cameras card. Each saved camera is a full config
# dict; `active_cameras` lists which to watch simultaneously. The detection
# settings below (model, person_confidence, roi, motion, ...) are the DEFAULTS a
# new camera inherits. `roll` = a person here rolls for a treat; `track_cats` =
# its cat sightings are logged. The treat dispenser (dice/dc/cooldown/speakers)
# is shared across all cameras.
active_cameras: []        # e.g. ["Kitchen", "Garage"]; empty = the single camera above
cameras: []               # e.g.:
#   - {name: Kitchen, url: "rtsp://1.2.3.4/main", username: admin, password: "secret",
#      roll: true,  track_cats: false, model: yolo11n, scan_fps: 10.0, roi: null}
#   - {name: Garage,  url: "usb:0", roll: false, track_cats: true, model: mobilenet_ssd}

# --- Speaker(s) (Google Home / Nest — where the chime plays) ---
speaker_names: []         # one or more exact names, e.g. ["Kitchen speaker", "Office"]
speaker_name: ""          # legacy single name (still honoured if speaker_names is empty)

# --- Sound / speech ---
sound_file: "treat_chime.wav"   # a file in d20app/sounds/ (upload your own in the GUI)
use_speech: false         # speak a message instead of playing the chime
speech_text: "Give the cat a treat!"   # what to say when use_speech is true

# --- Game rules ---
dice_sides: 20            # 20 = D20, 100 = D100, ...
dc: 20                    # treat when the roll is >= this (DC20 on a D20 = only a natural 20)
cooldown_seconds: 600     # minimum seconds between rolls (frequency interval)

# --- Detection tuning ---
detector_model: yolo11n   # yolo11n (better low-light/odd-pose, ~1.4x CPU; default), yolo11m (medium, bigger/slower, ~5-18x CPU), or mobilenet_ssd (lightest); falls back to mobilenet_ssd if YOLO can't load
accelerator: cpu          # cpu (default), opencl (iGPU via OpenCL, no extra deps), openvino-gpu or openvino-auto (Intel OpenVINO; needs the optional 'openvino' pkg + Intel GPU drivers). Intel iGPU only; auto-falls back to CPU if it can't start
person_confidence: 0.5    # 0..1; raise to reduce false triggers, lower to catch harder poses
confirm_frames: 4         # require a person in this many frames in a row (cuts false positives, incl. a moving cat's brief high-confidence frame)
detect_size: 300          # neural-net input size; 300 = reliable for people, 512 = distant cats (more CPU)
scan_fps: 10.0            # frames/sec read from the camera; lower = less CPU (good for the main feed)
smooth_live_feed: false   # run a dedicated capture thread so the live GUI feed plays at camera rate (decoupled from inference); a little extra CPU/bandwidth
roi: null                 # [x, y, w, h] region of interest — set this visually in the GUI

# --- Quiet time (no chimes during this daily window; leave blank to disable) ---
quiet_start: ""           # "HH:MM" 24h, e.g. "22:00"
quiet_end: ""             # "HH:MM" 24h, e.g. "07:00" (may wrap past midnight)

# --- Casting behaviour ---
dont_interrupt_playback: false   # if true, skip the chime when the speaker is already playing

# --- Servers ---
web_port: 8080            # the GUI
file_server_port: 8081    # serves the sound file to the speaker
